name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            test/fixtures/v3/package-lock.json
            test/fixtures/v4/package-lock.json

      - run: npm ci

      - run: npm run check

      - run: npm run typecheck

      - run: npm run build

      # `pretest` installs the fixtures' tailwindcss deps, then runs the
      # unit + integration vitest projects.
      - run: npm test
