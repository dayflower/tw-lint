name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            test/fixtures/v3/package-lock.json
            test/fixtures/v4/package-lock.json

      - run: npm ci

      - run: npm run check

      - run: npm run typecheck

      - run: npm run build

      # `pretest` installs the fixtures' tailwindcss deps, then runs the
      # unit + integration vitest projects.
      - run: npm test
